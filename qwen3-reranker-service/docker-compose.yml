# Docker Compose for Qwen3-Reranker Multi-Backend Service
# Use for local development and testing

version: '3.8'

services:
  # PyTorch CUDA backend (recommended for production)
  qwen3-reranker-cuda:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8011:8011"
    environment:
      - QWEN_RERANK_BACKEND=pytorch
      - QWEN_RERANK_PROFILE=qwen3_06b_cuda
      - QWEN_RERANK_HOST=0.0.0.0
      - QWEN_RERANK_PORT=8011
      - QWEN_RERANK_LOG_LEVEL=INFO
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped

  # vLLM backend (high-throughput)
  qwen3-reranker-vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    ports:
      - "8013:8011"
    environment:
      - QWEN_RERANK_BACKEND=vllm
      - QWEN_RERANK_PROFILE=qwen3_4b_vllm
      - QWEN_RERANK_HOST=0.0.0.0
      - QWEN_RERANK_PORT=8011
      - QWEN_RERANK_LOG_LEVEL=INFO
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped
    profiles:
      - vllm

# Networks
networks:
  default:
    name: qwen3-reranker-network
